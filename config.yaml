# quantrift_stock — 配置文件
# 仅发 Telegram 信号告警，不执行下单

# ── Telegram 告警配置 ──────────────────────────────────────────────────
# 留空则不发告警；也可通过环境变量 TG_TOKEN / TG_CHAT_ID 配置
telegram:
  token: ""
  chat_id: ""

# ── IB Gateway 配置 ────────────────────────────────────────────────────
ib:
  host: "127.0.0.1"
  port: 4002       # 模拟盘；实盘改 4001
  client_id: 2     # 期货引擎用 1，不能冲突

# ── 标的列表 ────────────────────────────────────────────────────────────
symbols:
  mag7:  [AAPL, MSFT, GOOGL, AMZN, META, NVDA, TSLA]
  semis: [SNDK, MU, STX, MRVL]
  etfs:  [SOXX, SMH, QQQ, SPY]

# ── 数据设置 ────────────────────────────────────────────────────────────
data:
  dir: "data"
  # yfinance 下载范围
  start_1h: "2023-01-01"   # 1h 最多 730 天
  start_4h: "2023-01-01"   # 由 1h 重采样
  start_1d: "2020-01-01"

# ── 策略参数（per timeframe） ────────────────────────────────────────────
# 注意：这是初始默认值，各标的需独立优化
# contract_size=1（股票无乘数），n_contracts=1（回测用固定1手）
timeframes:
  1h:
    interval: 1h
    # 信号参数
    min_score: 5
    adx_len: 14
    adx_threshold: 25.0      # 股票 ADX 普遍低于期货，从 30 降至 25
    use_adx: true
    use_vol: true
    use_bbmc_dir: true
    use_ci: true
    use_squeeze_mr: false
    use_staged_tp: true
    use_trend_filter: false
    allow_short: true
    allow_reversal_flip: true
    # 指标参数
    ut_atr: 8
    ut_key: 1.5              # 股票波动率较低，稍放宽止损
    ssl_len: 20
    ssl2_len: 10
    ssl_mult: 0.22
    exit_len: 14
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 7
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 2.4
    ci_len: 14
    ci_threshold: 61.8
    vol_len: 20
    vol_mult: 1.0
    trend_filter_len: 200
    # 止盈止损
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    tp1_portion: 0.34
    atr_sl_mult: 1.5         # 仓位计算用（目前固定1手，暂无作用）
    reversal_score: 2
    conflict_threshold: 2
    # 回测参数（不影响告警逻辑）
    n_contracts: 1
    contract_size: 1         # 股票：$1/点
    cash: 100000
    commission: 0.001        # 0.1% 双边手续费
    margin: 0.5              # Reg T 50%

  4h:
    interval: 4h
    min_score: 5
    adx_len: 14
    adx_threshold: 25.0
    use_adx: true
    use_vol: true
    use_bbmc_dir: true
    use_ci: true
    use_squeeze_mr: false
    use_staged_tp: true
    use_trend_filter: false
    allow_short: true
    allow_reversal_flip: true
    ut_atr: 5
    ut_key: 2.0
    ssl_len: 40
    ssl2_len: 13
    ssl_mult: 0.35
    exit_len: 17
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 10
    sqz_bbl: 20
    sqz_bbm: 2.3
    sqz_kcl: 20
    sqz_kcm: 1.5
    ci_len: 14
    ci_threshold: 61.3
    vol_len: 20
    vol_mult: 1.0
    trend_filter_len: 200
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    tp1_portion: 0.34
    atr_sl_mult: 1.5
    reversal_score: 2
    conflict_threshold: 2
    n_contracts: 1
    contract_size: 1
    cash: 100000
    commission: 0.001
    margin: 0.5

  1d:
    interval: 1d
    min_score: 3
    adx_len: 14
    adx_threshold: 20.0
    use_adx: true
    use_vol: true
    use_bbmc_dir: true
    use_ci: false
    use_squeeze_mr: false
    use_staged_tp: true
    use_trend_filter: true
    allow_short: true
    allow_reversal_flip: true
    ut_atr: 5
    ut_key: 3.0
    ssl_len: 40
    ssl2_len: 3
    ssl_mult: 0.34
    exit_len: 15
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 8
    sqz_bbl: 20
    sqz_bbm: 1.97
    sqz_kcl: 20
    sqz_kcm: 1.3
    ci_len: 14
    ci_threshold: 70.9
    vol_len: 20
    vol_mult: 1.0
    trend_filter_len: 200
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    tp1_portion: 0.34
    atr_sl_mult: 1.5
    reversal_score: 3
    conflict_threshold: 2
    n_contracts: 1
    contract_size: 1
    cash: 100000
    commission: 0.001
    margin: 0.5
