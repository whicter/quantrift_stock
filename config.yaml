# quantrift_stock — 配置文件
# 仅发 Telegram 信号告警，不执行下单

# ── Telegram 告警配置 ──────────────────────────────────────────────────
# 留空则不发告警；也可通过环境变量 TG_TOKEN / TG_CHAT_ID 配置
telegram:
  token: ""
  chat_id: ""

# ── IB Gateway 配置 ────────────────────────────────────────────────────
ib:
  host: "127.0.0.1"
  port: 4002       # 模拟盘；实盘改 4001
  client_id: 2     # 期货引擎用 1，不能冲突

# ── 标的列表（v2 分类） ──────────────────────────────────────────────────
# 策略说明见 LEARNING.md
symbols:
  # ConfluenceStrategy（高 ADX 动量，趋势跟踪）
  momentum:    [NVDA, MU, MRVL]

  # 高波动单股：独立处理，不与 momentum 混桶
  high_vol:    [TSLA]

  # 存储周期股：ConfluenceStrategy 谨慎使用（财报驱动、周期强）
  storage:     [SNDK, STX]

  # Mega-cap compounders：RSI2 + Market Regime Score + RS 过滤（4h/1d）
  mega_cap:    [MSFT, GOOGL, META]

  # 弱化/待观察：RSI2 Sharpe 低，暂不纳入主策略池
  watch:       [AAPL]

  # 待专项研究：RSI2 失效（Sharpe 0.27），ConfluenceStrategy 待验证
  # 备选方案："距 20 日高点回撤 5-10% + RSI 40-55"
  pending:     [AMZN]

  # 半导体 ETF：RSI2（不强制 RS vs QQQ）或 MR+ATR（待重新调参）
  sector_etf:  [SOXX, SMH]

  # 宽基 ETF：RSI2 benchmark 模式（不参与 RS 过滤）
  broad_etf:   [QQQ, SPY]

# ── 数据设置 ────────────────────────────────────────────────────────────
data:
  dir: "data"
  provider: "yfinance"     # 数据源：yfinance | tastytrade（未来）| ib（未来）
  # yfinance 下载范围
  start_1h: "2023-01-01"   # 1h 最多 730 天
  start_4h: "2023-01-01"   # 由 1h 重采样
  start_1d: "2020-01-01"

# ── 策略参数（per timeframe） ────────────────────────────────────────────
# 注意：这是初始默认值，各标的需独立优化
# contract_size=1（股票无乘数），n_contracts=1（回测用固定1手）
timeframes:
  1h:
    interval: 1h
    # 信号参数
    min_score: 5
    adx_len: 14
    adx_threshold: 25.0      # 股票 ADX 普遍低于期货，从 30 降至 25
    use_adx: true
    use_vol: true
    use_bbmc_dir: true
    use_ci: true
    use_squeeze_mr: false
    use_staged_tp: true
    use_trend_filter: true   # B: 只在趋势方向开仓（1h 用 200期≈8周 SMA）
    use_regime_filter: true  # Market Regime Score >= min_market_score 才开多
    min_market_score: 2      # 分数范围 -1~4（4个正分 -1跌破20日低）
    use_breakeven_after_tp1: false
    allow_short: true
    allow_reversal_flip: true
    # 指标参数
    ut_atr: 8
    ut_key: 1.5              # 股票波动率较低，稍放宽止损
    ssl_len: 20
    ssl2_len: 10
    ssl_mult: 0.22
    exit_len: 14
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 7
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 2.4
    ci_len: 14
    ci_threshold: 61.8
    vol_len: 20
    vol_mult: 1.0
    trend_filter_len: 200    # 1h: 200小时 ≈ 8周，作为中期趋势基准
    # 止盈止损
    atr_tp1_mult: 1.0
    atr_tp2_mult: 4.0        # A: 从2.0放宽到4.0，让利润单跑更远
    tp1_portion: 0.34
    use_fixed_initial_sl: true  # D: stage=1 用固定止损，TP1后切换追踪
    atr_sl_mult: 1.5
    reversal_score: 2
    conflict_threshold: 2
    # 回测参数（不影响告警逻辑）
    n_contracts: 1
    contract_size: 1         # 股票：$1/点
    cash: 100000
    commission: 0.001        # 0.1% 双边手续费
    margin: 0.5              # Reg T 50%

  4h:
    interval: 4h
    min_score: 5
    adx_len: 14
    adx_threshold: 25.0
    use_adx: true
    use_vol: true
    use_bbmc_dir: true
    use_ci: true
    use_squeeze_mr: false
    use_staged_tp: true
    use_trend_filter: true   # B: 只在趋势方向开仓（4h 用 100期≈50天 SMA）
    use_regime_filter: true
    min_market_score: 2
    use_breakeven_after_tp1: false
    allow_short: true
    allow_reversal_flip: true
    ut_atr: 5
    ut_key: 2.0
    ssl_len: 40
    ssl2_len: 13
    ssl_mult: 0.35
    exit_len: 17
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 10
    sqz_bbl: 20
    sqz_bbm: 2.3
    sqz_kcl: 20
    sqz_kcm: 1.5
    ci_len: 14
    ci_threshold: 61.3
    vol_len: 20
    vol_mult: 1.0
    trend_filter_len: 100    # 4h: 100×4h ≈ 50天，作为中期趋势基准
    atr_tp1_mult: 1.0
    atr_tp2_mult: 3.0        # A: 从2.0放宽到3.0
    tp1_portion: 0.34
    use_fixed_initial_sl: true  # D: stage=1 用固定止损
    atr_sl_mult: 1.5
    reversal_score: 2
    conflict_threshold: 2
    n_contracts: 1
    contract_size: 1
    cash: 100000
    commission: 0.001
    margin: 0.5

  1d:
    interval: 1d
    min_score: 3
    adx_len: 14
    adx_threshold: 20.0
    use_adx: true
    use_vol: true
    use_bbmc_dir: true
    use_ci: false
    use_squeeze_mr: false
    use_staged_tp: true
    use_trend_filter: true
    use_regime_filter: true
    min_market_score: 2
    use_breakeven_after_tp1: false
    allow_short: true
    allow_reversal_flip: true
    ut_atr: 5
    ut_key: 3.0
    ssl_len: 40
    ssl2_len: 3
    ssl_mult: 0.34
    exit_len: 15
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 8
    sqz_bbl: 20
    sqz_bbm: 1.97
    sqz_kcl: 20
    sqz_kcm: 1.3
    ci_len: 14
    ci_threshold: 70.9
    vol_len: 20
    vol_mult: 1.0
    trend_filter_len: 200    # 1d: 200日 SMA，标准牛熊分界线
    atr_tp1_mult: 1.0
    atr_tp2_mult: 3.0        # A: 从2.0放宽到3.0
    tp1_portion: 0.34
    use_fixed_initial_sl: true  # D: stage=1 用固定止损
    atr_sl_mult: 2.0         # 1d 波动更大，初始止损给更多空间
    reversal_score: 3
    conflict_threshold: 2
    n_contracts: 1
    contract_size: 1
    cash: 100000
    commission: 0.001
    margin: 0.5

# ── 各标的参数覆盖（只写需要覆盖的字段，其余继承 timeframes 默认值） ──────
symbol_params:
  AAPL:
    1h:  {adx_threshold: 15.0, ut_key: 3.0, min_score: 5}
    4h:  {adx_threshold: 15.0, ut_key: 3.0, min_score: 4}
    1d:  {adx_threshold: 25.0, ut_key: 3.0, min_score: 5}
  MSFT:
    1h:  {adx_threshold: 20.0, ut_key: 1.0, min_score: 5}
    4h:  {adx_threshold: 15.0, ut_key: 3.0, min_score: 4}
    1d:  {adx_threshold: 15.0, ut_key: 2.5, min_score: 4}
  GOOGL:
    1h:  {adx_threshold: 15.0, ut_key: 2.5, min_score: 4}
    4h:  {adx_threshold: 25.0, ut_key: 3.0, min_score: 4}
    1d:  {adx_threshold: 15.0, ut_key: 2.0, min_score: 4}
  AMZN:
    1h:  {adx_threshold: 25.0, ut_key: 3.0, min_score: 5}
    4h:  {adx_threshold: 15.0, ut_key: 2.0, min_score: 5}
    1d:  {adx_threshold: 15.0, ut_key: 2.0, min_score: 5}
  META:
    1h:  {adx_threshold: 15.0, ut_key: 2.0, min_score: 5}
    4h:  {adx_threshold: 20.0, ut_key: 1.5, min_score: 5}
    1d:  {adx_threshold: 15.0, ut_key: 3.0, min_score: 5}
  NVDA:
    # 1h: ConfluenceStrategy 全网格最优 Sharpe -0.72，RSI2 v2 -0.93，结构性剔除
    4h:  {adx_threshold: 20.0, ut_key: 3.0, min_score: 5}   # Confluence Sharpe 0.60（样本不足）
    1d:  {adx_threshold: 30.0, ut_key: 2.5, min_score: 4}   # Confluence Sharpe 0.64 → RSI2 v2 更优 Sharpe 0.867（entry=5, trail=2×, hold≤15, score≥1）
  TSLA:
    1h:  {adx_threshold: 25.0, ut_key: 2.5, min_score: 4}   # 1h 无效，不做主力
    4h:  {adx_threshold: 30.0, ut_key: 3.0, min_score: 5}   # 样本不足（23笔），仅参考
    1d:  {adx_threshold: 25.0, ut_key: 2.0, min_score: 4, use_breakeven_after_tp1: true}  # ut_key=2.0 → TP1后止损仍低于入场价1ATR，须保本
  SNDK:
    1h:  {adx_threshold: 15.0, ut_key: 1.5, min_score: 5}
    4h:  {adx_threshold: 15.0, ut_key: 3.0, min_score: 4}
    1d:  {adx_threshold: 30.0, ut_key: 3.0, min_score: 4}
  MU:
    1h:  {adx_threshold: 30.0, ut_key: 2.0, min_score: 5}   # Confluence Sharpe 1.58（主力）
    4h:  {adx_threshold: 20.0, ut_key: 1.0, min_score: 4}   # Confluence Sharpe 1.04（备选：RSI2 entry=15 trail=2× Sharpe 1.67⚠️20笔）
    1d:  {adx_threshold: 15.0, ut_key: 3.0, min_score: 4}   # Confluence 废（0.23）→ 用 RSI2 entry=5 trail=3× hold≤10 score≥3 Sharpe 0.94
  STX:
    1h:  {adx_threshold: 30.0, ut_key: 3.0, min_score: 4}
    4h:  {adx_threshold: 25.0, ut_key: 1.5, min_score: 4}
    1d:  {adx_threshold: 20.0, ut_key: 1.5, min_score: 4}
  MRVL:
    1h:  {adx_threshold: 15.0, ut_key: 1.0, min_score: 5, use_breakeven_after_tp1: true}  # Confluence Sharpe 0.94（RR 0.88，保本止损已加）
    4h:  {adx_threshold: 30.0, ut_key: 3.0, min_score: 4}   # Confluence Sharpe 0.72（样本不足） → RSI2 4h 1.123⚠️（N=25 不可信）
    1d:  {adx_threshold: 20.0, ut_key: 3.0, min_score: 4}   # Confluence 0.37 → 换 RSI2 v2：entry=15, trail=2×, hold≤5, score≥2, Sharpe 0.748
  SOXX:
    1h:  {adx_threshold: 15.0, ut_key: 2.5, min_score: 5}
    4h:  {adx_threshold: 15.0, ut_key: 1.0, min_score: 5}
    1d:  {adx_threshold: 15.0, ut_key: 3.0, min_score: 4}
  SMH:
    1h:  {adx_threshold: 15.0, ut_key: 1.5, min_score: 5}
    4h:  {adx_threshold: 20.0, ut_key: 3.0, min_score: 4}
    1d:  {adx_threshold: 20.0, ut_key: 2.0, min_score: 4}
  QQQ:
    1h:  {adx_threshold: 15.0, ut_key: 2.0, min_score: 5}
    4h:  {adx_threshold: 20.0, ut_key: 3.0, min_score: 5}
    1d:  {adx_threshold: 20.0, ut_key: 2.5, min_score: 5}
  SPY:
    1h:  {adx_threshold: 15.0, ut_key: 2.0, min_score: 5}
    4h:  {adx_threshold: 15.0, ut_key: 1.5, min_score: 5}
    1d:  {adx_threshold: 30.0, ut_key: 2.0, min_score: 4}
